<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>FlipOff. — Free Split-Flap Display for Any TV</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Hover control panel -->
  <div class="control-panel" id="control-panel">
    <div class="control-panel-inner">
      <span class="cp-logo">FlipOff.</span>
      <div class="cp-buttons">
        <button class="cp-btn" id="cp-prev" title="Previous">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Prev
        </button>
        <button class="cp-btn" id="cp-next" title="Next">
          <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
          Next
        </button>
        <button class="cp-btn" id="cp-clock" title="Toggle clock">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Clock
        </button>
        <button class="cp-btn" id="cp-mute" title="Toggle mute">
          <svg viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          Sound
        </button>
      </div>
    </div>
  </div>

  <div class="page-frame">
    <!-- Board -->
    <section class="board-section" id="board-container">
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
