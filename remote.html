<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FlipOff Remote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: rgba(255,255,255,0.4); }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      align-self: flex-start;
      width: 100%;
      max-width: 320px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 16px;
      border-radius: 18px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      background: #1e1e1e;
      color: rgba(255,255,255,0.6);
    }

    .btn:active { transform: scale(0.93); opacity: 0.6; }

    .btn svg {
      width: 26px; height: 26px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Active states */
    .btn.active          { background: #0a3060; color: #7eb8f7; }
    .btn.muted           { background: #2a1010; color: #f77e7e; }

    /* Volume row */
    .vol-row {
      display: grid;
      grid-template-columns: 1fr 56px 1fr;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      align-items: center;
    }

    .vol-display {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.5);
    }

    .status {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }
    .status.connected { color: #00cc88; }
  </style>
</head>
<body>
  <h1>FlipOff.</h1>

  <div class="section-label">Playback</div>
  <div class="grid">
    <button class="btn" data-cmd="prev">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Prev
    </button>
    <button class="btn" data-cmd="next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      Next
    </button>
    <button class="btn" id="btn-clock" data-cmd="clock">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Clock
    </button>
    <button class="btn" id="btn-mute" data-cmd="mute">
      <svg id="icon-sound" viewBox="0 0 24 24">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <svg id="icon-muted" viewBox="0 0 24 24" style="display:none">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
      <span id="mute-label">Sound</span>
    </button>
  </div>

  <div class="section-label">Volume</div>
  <div class="vol-row">
    <button class="btn" data-cmd="vol-down">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Vol −
    </button>
    <div class="vol-display" id="vol-display">80%</div>
    <button class="btn" data-cmd="vol-up">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Vol +
    </button>
  </div>

  <p class="status" id="status">Connecting...</p>

  <script>
    const statusEl  = document.getElementById('status');
    const btnClock  = document.getElementById('btn-clock');
    const btnMute   = document.getElementById('btn-mute');
    const muteLabel = document.getElementById('mute-label');
    const iconSound = document.getElementById('icon-sound');
    const iconMuted = document.getElementById('icon-muted');
    const volDisplay = document.getElementById('vol-display');

    function applyState(state) {
      btnClock.classList.toggle('active', state.clock);
      btnMute.classList.toggle('muted', state.muted);
      iconSound.style.display = state.muted ? 'none' : '';
      iconMuted.style.display = state.muted ? '' : 'none';
      muteLabel.textContent   = state.muted ? 'Muted' : 'Sound';
      volDisplay.textContent  = Math.round(state.volume * 100) + '%';
    }

    async function send(cmd) {
      try {
        await fetch('/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cmd }),
        });
      } catch {
        statusEl.textContent = 'Lost connection';
        statusEl.className = 'status';
      }
    }

    document.querySelectorAll('.btn[data-cmd]').forEach(btn => {
      btn.addEventListener('click', () => send(btn.dataset.cmd));
    });

    const es = new EventSource('/events');
    es.onopen = () => {
      statusEl.textContent = 'Connected';
      statusEl.className = 'status connected';
    };
    es.onerror = () => {
      statusEl.textContent = 'Disconnected';
      statusEl.className = 'status';
    };
    es.addEventListener('state', (e) => applyState(JSON.parse(e.data)));
  </script>
</body>
</html>
